<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery Address</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:950px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      display:flex;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    /* LEFT SECTION */

    .left-section{
      width:40%;
      background:#ff6b00;
      color:white;
      padding:40px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .left-section h1{
      font-size:36px;
      margin-bottom:20px;
    }

    .left-section p{
      line-height:1.6;
      margin-bottom:30px;
    }

    .feature-box{
      background:rgba(255,255,255,0.2);
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .feature-box h3{
      margin-bottom:8px;
    }

    /* RIGHT SECTION */

    .right-section{
      width:60%;
      padding:40px;
    }

    .right-section h2{
      font-size:30px;
      margin-bottom:25px;
      color:#333;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#444;
    }

    input,
    textarea{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      outline:none;
    }

    input:focus,
    textarea:focus{
      border-color:#ff6b00;
    }

    textarea{
      resize:none;
    }

    .row{
      display:flex;
      gap:15px;
    }

    .row .form-group{
      flex:1;
    }

    button{
      width:100%;
      padding:14px;
      background:#ff6b00;
      color:white;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e55d00;
    }

    /* FLOW */

    .flow{
      margin-top:25px;
      text-align:center;
      font-size:14px;
      color:#666;
      line-height:1.8;
    }

    .active{
      color:#ff6b00;
      font-weight:bold;
    }

    /* MOBILE */

    @media(max-width:768px){

      .container{
        flex-direction:column;
      }

      .left-section,
      .right-section{
        width:100%;
      }

      .row{
        flex-direction:column;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->

  <div class="left-section">

    <h1>Delivery Address</h1>

    <p>
      Enter your address details to receive your favorite food quickly and safely.
    </p>

    <div class="feature-box">
      <h3>Fast Delivery</h3>
      <p>Food delivered within minutes.</p>
    </div>

    <div class="feature-box">
      <h3>Secure Information</h3>
      <p>Your address details are fully protected.</p>
    </div>

  </div>

  <!-- RIGHT -->

  <div class="right-section">

    <h2>Enter Address</h2>

    <!-- FORM -->

    <form action="/address" method="POST">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text"
               name="full_name"
               placeholder="Enter your full name"
               required>
      </div>

      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel"
               name="mobile"
               placeholder="Enter mobile number"
               required>
      </div>

      <div class="form-group">
        <label>Street Address</label>
        <textarea rows="4"
                  name="address"
                  placeholder="House no, Street, Area"
                  required></textarea>
      </div>

      <div class="row">

        <div class="form-group">
          <label>City</label>
          <input type="text"
                 name="city"
                 placeholder="Enter city"
                 required>
        </div>

        <div class="form-group">
          <label>Pincode</label>
          <input type="text"
                 name="pincode"
                 placeholder="Enter pincode"
                 required>
        </div>

      </div>

      <div class="form-group">
        <label>Landmark</label>
        <input type="text"
               name="landmark"
               placeholder="Nearby landmark">
      </div>

      <button type="submit">
        Proceed To Checkout
      </button>

    </form>

  </div>

</div>
</body>
</html>
