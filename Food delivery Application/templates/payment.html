<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.payment-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.total{
    font-size:24px;
    text-align:center;
    margin-bottom:25px;
    color:#ff6b00;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#ff6b00;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#e55d00;
}
</style>
</head>
<body>

<div class="payment-box">

<h2>Payment</h2>

<div class="total">
    Total Amount: ₹{{ total }}
</div>

<form action="/my_orders">
    <button type="submit">Pay Now</button>
</form>

</div>

</body>
</html>
