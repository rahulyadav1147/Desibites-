
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#fff5f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    width:400px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h1{
    color:#ff4d4d;
    text-align:center;
    margin-bottom:5px;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    display:flex;
    align-items:center;
    margin-bottom:15px;
}

.form-group label{
    width:120px;
    font-weight:bold;
}

.form-group input{
    flex:1;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63e3e;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#ff4d4d;
}

</style>
</head>

<body>

<div class="container">

<h1>Desibytes</h1>
<h2>Login</h2>

<form method="POST">

<div class="form-group">
<label>Username:</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Password:</label>
<input type="password" name="password" required>
</div>

<button type="submit">Login</button>

</form>

{% if error %}
<p style="color:red; text-align:center;">{{ error }}</p>
{% endif %}

<a href="/signup">Create New Account</a>

</div>

</body>
</html>
