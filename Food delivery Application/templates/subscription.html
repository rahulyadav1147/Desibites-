<!DOCTYPE html>
<html>
<head>
<title>Food Subscription</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:40px;
}

.container{
    width:450px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#ff4d4d;
    margin-bottom:25px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#ff4d4d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#e63e3e;
}

.note{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}

/* SELECTED FOOD SUMMARY */

.selected-food{
    display:none;
    align-items:center;
    gap:12px;
    margin:10px 0;
    padding:10px;
    border:1px solid #eee;
    border-radius:8px;
    background:#fafafa;
}

.selected-food img{
    width:55px;
    height:55px;
    object-fit:cover;
    border-radius:8px;
}

.selected-food .info{
    flex:1;
}

.selected-food .info b{
    display:block;
    font-size:15px;
}

.selected-food .info span{
    color:#ff4d4d;
    font-weight:bold;
    font-size:14px;
}

.selected-food .change-btn{
    width:auto;
    padding:6px 12px;
    font-size:13px;
    border-radius:6px;
}

/* MENU POPUP */

.overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:20px;
}

.menu-popup{
    background:white;
    width:500px;
    max-width:100%;
    max-height:80vh;
    border-radius:12px;
    padding:20px;
    overflow-y:auto;
}

.menu-popup h3{
    color:#ff4d4d;
    margin-bottom:15px;
    text-align:center;
}

.menu-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.food-card{
    border:2px solid #eee;
    border-radius:10px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s;
}

.food-card:hover{
    border-color:#ffb3b3;
}

.food-card.selected{
    border-color:#ff4d4d;
    background:#fff5f5;
}

.food-card img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:8px;
}

.food-card h4{
    font-size:14px;
    margin-bottom:4px;
}

.food-card p{
    color:#ff4d4d;
    font-weight:bold;
    font-size:13px;
}

.close-popup{
    width:auto;
    display:block;
    margin:15px auto 0;
    padding:8px 20px;
    background:#ccc;
    color:#333;
}

.close-popup:hover{
    background:#bbb;
}

</style>
</head>

<body>

<div class="container">

<h2>Food Subscription</h2>

<form method="POST" id="subscriptionForm">

<!-- RESTAURANT -->

<select name="restaurant"
        id="restaurant"
        onchange="onRestaurantChange()"
        required>

<option value="">
Select Restaurant
</option>

<option value="Spice Hub">
Spice Hub
</option>

<option value="Pizza Palace">
Pizza Palace
</option>

<option value="Burger Town">
Burger Town
</option>

<option value="South Delight">
South Delight
</option>

<option value="Chinese Corner">
Chinese Corner
</option>

<option value="Punjabi Dhaba">
Punjabi Dhaba
</option>

</select>

<!-- SELECTED FOOD SUMMARY (shown after picking from the popup menu) -->

<div class="selected-food" id="selectedFoodBox">
    <img id="selectedFoodImg" src="" alt="">
    <div class="info">
        <b id="selectedFoodName"></b>
        <span id="selectedFoodPriceText"></span>
    </div>
    <button type="button" class="change-btn" onclick="openMenuPopup()">Change</button>
</div>

<!-- HIDDEN FIELD SENT TO THE SERVER -->

<input type="hidden" name="food_name" id="food_name" required>

<!-- PLAN -->

<select name="plan_type"
        id="plan_type"
        onchange="calculatePrice()"
        required>

<option value="">
Select Plan
</option>

<option value="Weekly">
Weekly Plan
</option>

<option value="Monthly">
Monthly Plan
</option>

</select>
<!-- DELIVERY TIME -->

<select name="delivery_time" required>

<option value="">
Choose Delivery Time
</option>

<!-- BREAKFAST -->

<option value="7:00 AM - 7:30 AM">
7:00 AM - 7:30 AM
</option>

<option value="7:30 AM - 8:00 AM">
7:30 AM - 8:00 AM
</option>

<option value="8:00 AM - 8:30 AM">
8:00 AM - 8:30 AM
</option>

<option value="8:30 AM - 9:00 AM">
8:30 AM - 9:00 AM
</option>

<!-- LUNCH -->

<option value="12:00 PM - 12:30 PM">
12:00 PM - 12:30 PM
</option>

<option value="12:30 PM - 1:00 PM">
12:30 PM - 1:00 PM
</option>

<option value="1:00 PM - 1:30 PM">
1:00 PM - 1:30 PM
</option>

<option value="1:30 PM - 2:00 PM">
1:30 PM - 2:00 PM
</option>

<!-- EVENING -->

<option value="5:00 PM - 5:30 PM">
5:00 PM - 5:30 PM
</option>

<option value="5:30 PM - 6:00 PM">
5:30 PM - 6:00 PM
</option>

<!-- DINNER -->

<option value="8:00 PM - 8:30 PM">
8:00 PM - 8:30 PM
</option>

<option value="8:30 PM - 9:00 PM">
8:30 PM - 9:00 PM
</option>

<option value="9:00 PM - 9:30 PM">
9:00 PM - 9:30 PM
</option>

<option value="9:30 PM - 10:00 PM">
9:30 PM - 10:00 PM
</option>

</select>
<!-- PRICE -->
<input type="number"
       name="price"
       id="price"
       placeholder="Subscription Price"
       readonly>



<!-- ADDRESS -->

<textarea name="address"
          rows="4"
          placeholder="Delivery Address"
          required></textarea>

<!-- BUTTON -->

<button type="submit">
Subscribe Now
</button>

<p class="note">
Get recurring meals delivered automatically 🚀
</p>

</form>

</div>

<!-- MENU POPUP (opens automatically when a restaurant is picked) -->

<div class="overlay" id="menuOverlay">
    <div class="menu-popup">
        <h3 id="menuPopupTitle">Menu</h3>
        <div class="menu-grid" id="menuGrid"></div>
        <button type="button" class="close-popup" onclick="closeMenuPopup()">Close</button>
    </div>
</div>

<!-- JAVASCRIPT -->

<script>

// FOOD MENUS PER RESTAURANT, WITH IMAGES
// image paths point at /static/images/<file>

const RESTAURANT_MENUS = {

    "Spice Hub":[
        { name:"Paneer Curry", price:200, image:"butterChicken.png" },
        { name:"Butter Naan", price:80, image:"pp roti.jpg" },
        { name:"Veg Biryani", price:250, image:"puri sabji.jpg" },
        { name:"Dal Fry", price:150, image:"dalMakhni.png" }
    ],

    "Pizza Palace":[
        { name:"Margherita Pizza", price:300, image:"Margherita Pizza Recipe 3.jpeg" },
        { name:"Cheese Pizza", price:350, image:"mag.piza.jpg" },
        { name:"Farmhouse Pizza", price:400, image:"pepronipizza.jpg" },
        { name:"Garlic Bread", price:120, image:"pizza1.jpeg" }
    ],

    "Burger Town":[
        { name:"Veg Burger", price:120, image:"Photo of a vibrant vegetarian burger featuring a#U2026.jpeg" },
        { name:"Cheese Burger", price:150, image:"Cheese_Burger.png" },
        { name:"French Fries", price:90, image:"French_Fries.png" },
        { name:"Cold Coffee", price:100, image:"Sandwich.png" }
    ],

    "South Delight":[
        { name:"Dosa", price:100, image:"idli sambar.jpg" },
        { name:"Idli", price:80, image:"idli sambar.jpg" },
        { name:"Vada", price:90, image:"samosa.jpg" },
        { name:"Uttapam", price:120, image:"puri sabji.jpg" }
    ],

    "Chinese Corner":[
        { name:"Noodles", price:180, image:"roll.png" },
        { name:"Manchurian", price:200, image:"ChickenNuggets.png" },
        { name:"Fried Rice", price:220, image:"Red Sauce Pasta.png" },
        { name:"Spring Roll", price:150, image:"roll.png" }
    ],

    "Punjabi Dhaba":[
        { name:"Chole Bhature", price:180, image:"puri sabji.jpg" },
        { name:"Paneer Butter Masala", price:250, image:"butterChicken.png" },
        { name:"Lassi", price:90, image:"tippin .jpg" },
        { name:"Tandoori Roti", price:40, image:"pp roti.jpg" }
    ]
};

const IMAGE_BASE = "{{ url_for('static', filename='images/') }}";

let selectedFoodPrice = 0;

// WHEN A RESTAURANT IS PICKED, OPEN ITS MENU AS A POPUP

function onRestaurantChange(){

    // reset any previously selected food since it belonged to the old restaurant
    selectedFoodPrice = 0;
    document.getElementById("food_name").value = "";
    document.getElementById("selectedFoodBox").style.display = "none";
    document.getElementById("price").value = "";

    let restaurant = document.getElementById("restaurant").value;

    if(restaurant){
        openMenuPopup();
    }
}

function openMenuPopup(){

    let restaurant = document.getElementById("restaurant").value;

    if(!restaurant){
        return;
    }

    let foods = RESTAURANT_MENUS[restaurant] || [];

    document.getElementById("menuPopupTitle").textContent = restaurant + " - Menu";

    let grid = document.getElementById("menuGrid");
    grid.innerHTML = "";

    let currentFoodName = document.getElementById("food_name").value;

    for(let i=0; i<foods.length; i++){

        let food = foods[i];

        let card = document.createElement("div");
        card.className = "food-card" + (food.name === currentFoodName ? " selected" : "");

        card.innerHTML =
            "<img src='" + IMAGE_BASE + encodeURIComponent(food.image) + "'>" +
            "<h4>" + food.name + "</h4>" +
            "<p>₹" + food.price + "</p>";

        card.onclick = function(){
            selectFood(food, card);
        };

        grid.appendChild(card);
    }

    document.getElementById("menuOverlay").style.display = "flex";
}

function closeMenuPopup(){
    document.getElementById("menuOverlay").style.display = "none";
}

// USER TAPPED A DISH INSIDE THE POPUP

function selectFood(food, cardEl){

    // clear "selected" styling from sibling cards
    let cards = document.querySelectorAll(".food-card");
    cards.forEach(c => c.classList.remove("selected"));
    cardEl.classList.add("selected");

    document.getElementById("food_name").value = food.name;
    selectedFoodPrice = food.price;

    document.getElementById("selectedFoodImg").src = IMAGE_BASE + encodeURIComponent(food.image);
    document.getElementById("selectedFoodName").textContent = food.name;
    document.getElementById("selectedFoodPriceText").textContent = "₹" + food.price;
    document.getElementById("selectedFoodBox").style.display = "flex";

    calculatePrice();
    closeMenuPopup();
}

// AUTO PRICE CALCULATION (subscription total based on chosen plan)

function calculatePrice(){

    let plan = document.getElementById("plan_type").value;

    let total = 0;

    if(selectedFoodPrice > 0){

        if(plan == "Weekly"){
            total = (selectedFoodPrice * 7) - (selectedFoodPrice * 7 * 0.05);
        }
        else if(plan == "Monthly"){
            total = (selectedFoodPrice * 30) - (selectedFoodPrice * 30 * 0.10);
        }
    }

    document.getElementById("price").value = total;
}

// DON'T LET THE FORM SUBMIT WITHOUT A FOOD SELECTION

document.getElementById("subscriptionForm").addEventListener("submit", function(e){

    if(!document.getElementById("food_name").value){
        e.preventDefault();
        alert("Please select a dish from the restaurant menu first.");
        let restaurant = document.getElementById("restaurant").value;
        if(restaurant){
            openMenuPopup();
        }
    }
});

</script>

</body>
</html>
