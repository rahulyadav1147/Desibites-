<!DOCTYPE html>
<html>
<head>
<title>Admin Subscriptions</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}

h2{
    text-align:center;
    color:#ff4d4d;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th{
    background:#ff4d4d;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#fff5f5;
}

.active{
    color:green;
    font-weight:bold;
}

</style>

</head>

<body>

<h2>Subscription Management</h2>
<form method="GET"
      action="{{ url_for('admin_subscriptions') }}"
      style="margin-bottom:20px;">

<select name="plan">

<option value="">
All Plans
</option>

<option value="Weekly">
Weekly
</option>

<option value="Monthly">
Monthly
</option>

</select>

<button type="submit">
Filter Subscription
</button>

</form>

<table>

<tr>

<th>ID</th>
<th>User</th>
<th>Restaurant</th>
<th>Food</th>
<th>Price</th>
<th>Plan</th>
<th>Delivery Time</th>
<th>Start Date</th>
<th>End Date</th>
<th>Status</th>

</tr>

{% for sub in subscriptions %}

<tr>

<td>{{ sub[0] }}</td>

<td>{{ sub[1] }}</td>

<td>{{ sub[2] }}</td>

<td>{{ sub[3] }}</td>

<td>₹{{ sub[4] }}</td>

<td>{{ sub[5] }}</td>

<td>{{ sub[6] }}</td>

<td>{{ sub[7] }}</td>

<td>{{ sub[8] }}</td>

<td class="active">
{{ sub[9] }}
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
